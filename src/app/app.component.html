<nav class="navbar navbar-dark bg-dark">
  <a class="navbar-brand">
    <img src="assets/img/favicon-32x32.png" width="32" height="32" class="d-inline-block align-top" alt="">
    {{title}}
  </a>
</nav>

<div class="lottery-board">

  <!-- LEFT PANEL: Pre-draft standings -->
  <div class="pre-draft-panel">
    <div class="panel-title">Classement Actuel</div>
    <div class="team-row" *ngFor="let entry of entries">
      <span class="rank-num">{{entry.rank}}</span>
      <span class="team-name-text">{{entry.name}}</span>
      <span class="team-odds">{{entry.weight}}%</span>
      <img class="team-logo-sm" src="assets/img/logos/{{entry.name | lowercase}}.jpg" alt="{{entry.name}}">
    </div>
  </div>

  <!-- RIGHT PANEL: Draft results in 2 columns -->
  <div class="results-panel">

    <div class="picks-grid">

      <!-- Column 1: picks 1-10 -->
      <div class="picks-column">
        <div class="pick-slot" *ngFor="let p of pickSlots1">
          <span class="pick-num">{{p}}</span>
          <ng-container *ngIf="displayedResults.length >= 17-p">
            <span class="pick-team">{{displayedResults[16-p]}}</span>
            <img class="team-logo-md" src="assets/img/logos/{{displayedResults[16-p] | lowercase}}.jpg" alt="">
          </ng-container>
        </div>
      </div>

      <!-- Column 2: picks 11-16 -->
      <div class="picks-column">
        <div class="pick-slot" *ngFor="let p of pickSlots2">
          <span class="pick-num">{{p}}</span>
          <ng-container *ngIf="displayedResults.length >= 17-p">
            <span class="pick-team">{{displayedResults[16-p]}}</span>
            <img class="team-logo-md" src="assets/img/logos/{{displayedResults[16-p] | lowercase}}.jpg" alt="">
          </ng-container>
        </div>
      </div>

    </div>

    <div class="controls-row">
      <button *ngIf="!draftDone" class="btn btn-primary btn-lg" (click)="onDraft()">
        Exécuter la pige
      </button>
      <button *ngIf="draftDone && !displayResultsDone" class="btn btn-success btn-lg" (click)="nextTeam()">
        Prochaine position
      </button>
      <div *ngIf="displayResultsDone" class="alert alert-success d-inline-block mb-0">
        <strong>Gagnants de la pige :</strong>
        <span *ngFor="let team of results; index as i">&nbsp; {{i+1}}- {{team}}</span>
      </div>
    </div>

  </div>
</div>
